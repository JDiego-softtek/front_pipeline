name: frontend_ci

on:
  pull_request:
    # branches:
    #   - dev
    # paths:
    #   - membershipmonorepo/frontend/**

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm audit)
        run: npm audit --audit-level=high

      - name: Run lint
        run: npm run lint

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name myacr

      - name: Build Docker image
        run: |
          docker build \
            -t myacr.azurecr.io/myapp:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myacr.azurecr.io/myapp:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push image to ACR
        run: |
          docker push myacr.azurecr.io/myapp:${{ github.sha }}
