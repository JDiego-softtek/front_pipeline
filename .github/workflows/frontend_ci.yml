name: frontend_ci

on:
  #pull_request:
  #  types: [opened, synchronize, reopened]
  #  branches:
  #    - dev
  

  
  workflow_dispatch:

env:
  IMAGE_NAME: frontend

jobs:
  ci:
    name: Build, Audit, Lint, Scan & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          #cache: 'npm'
          #cache-dependency-path: membership-platform-dev/frontend/package-lock.json

      - name: Install dependencies
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm ci

      - name: Security audit
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm audit --audit-level=critical  #->mover a high en prod

      - name: Run linter
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm run lint

#      - name: Authenticate with Azure
#        uses: azure/login@v2
#        with:
#          client-id: ${{ secrets.AZURE_CLIENT_ID }}
#          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
#          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

#      - name: Log in to Azure Container Registry
#        uses: docker/login-action@v3
#        with:
#          registry: ${{ secrets.ACR_LOGIN_SERVER }}
#          username: ${{ secrets.ACR_USERNAME }}
#          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            membership-platform-dev/membership-platform-dev/frontend
          #  -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #  -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }} \
          #  -f Dockerfile \
          #  .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
         # format: table
          exit-code: '1'
         # ignore-unfixed: true
          vuln-type: library  #os,library
          severity: CRITICAL,HIGH

#      - name: Push Docker image to ACR
#        run: |
#          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
#          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
