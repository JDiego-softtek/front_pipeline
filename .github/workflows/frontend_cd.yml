name: frontend_cd

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["frontend_ci"]
    types:
      - completed
    branches:
      - main

env:
  IMAGE_NAME: frontend
  WEBAPP_NAME: ${{ secrets.WEBAPP_NAME }}

jobs:
  cd:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate with Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_APP }}

      - name: Validate required secrets
        run: |
          MISSING=0
          if [ -z "${{ secrets.WEBAPP_NAME }}" ]; then
            echo "::error::Secret WEBAPP_NAME is not set or is empty."
            MISSING=1
          else
            echo "WEBAPP_NAME is set (length: ${#WEBAPP_NAME_VAL})"
          fi
          if [ -z "${{ secrets.RESOURCE_GROUP }}" ]; then
            echo "::error::Secret RESOURCE_GROUP is not set or is empty."
            MISSING=1
          else
            echo "RESOURCE_GROUP is set."
          fi
          if [ -z "${{ secrets.ACR_LOGIN_SERVER }}" ]; then
            echo "::error::Secret ACR_LOGIN_SERVER is not set or is empty."
            MISSING=1
          else
            echo "ACR_LOGIN_SERVER is set."
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::One or more required secrets are missing. Please configure them in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Deploy image to Azure App Service
        run: |
          az webapp config container set \
            --name ${{ secrets.WEBAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }}

      - name: Restart Azure App Service
        run: |
          az webapp restart \
            --name ${{ secrets.WEBAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }}
