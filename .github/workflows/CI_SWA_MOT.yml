name: swa_mot

on:
  workflow_dispatch:

jobs:
  ci:
    name: Build frontend for SWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm ci

      - name: Security audit
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm audit --audit-level=critical

      - name: Run linter
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm run lint

      - name: Build frontend
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm run build

