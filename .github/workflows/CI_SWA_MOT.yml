name: swa_mot

on:
  workflow_dispatch:

env:
  IMAGE_NAME: frontend

jobs:
  ci:
    name: Build, Audit, Lint, Scan & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          #cache: 'npm'
          #cache-dependency-path: membership-platform-dev/frontend/package-lock.json

      - name: Install dependencies
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm ci

      - name: Security audit
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm audit --audit-level=critical  #->mover a high en prod

      - name: Run linter
        working-directory: membership-platform-dev/membership-platform-dev/frontend
        run: npm run lint

      - name: Authenticate with Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            membership-platform-dev/membership-platform-dev/frontend

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'  #-> '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Tag and push Docker image to ACR
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
